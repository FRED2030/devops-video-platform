name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Auth Service
      - name: Install Auth Service Dependencies
        working-directory: ./services/auth-service
        run: npm install

      # Video Service
      - name: Install Video Service Dependencies
        working-directory: ./services/video-service
        run: npm install

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      # Build Docker Images
      - name: Build Auth Service Image
        run: docker build -t auth-service ./services/auth-service

      - name: Build Video Service Image
        run: docker build -t video-service ./services/video-service

      - name: Build Frontend Image
        run: docker build -t frontend ./frontend
